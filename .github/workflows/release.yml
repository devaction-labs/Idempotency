name: Deploy & Release

# Flow (single job — on purpose):
#   1. Someone labels an open PR with "deploy".
#   2. This job enables GitHub's auto-merge (squash).
#   3. It polls the PR until GitHub finishes the merge (or times out).
#   4. Deletes the merged branch explicitly (auto-merge's --delete-branch
#      flag is not always honoured once the merge is queued).
#   5. Computes the next SemVer tag and cuts a release on main.
#
# Why single-job? Events produced by GITHUB_TOKEN (like the PR-closed event
# fired by auto-merge) do NOT trigger downstream workflow runs. Splitting
# this into two jobs keyed on "closed" would never run the second half
# unless we swapped GITHUB_TOKEN for a PAT.
#
# Version bump rules (based on PR labels present when the job starts):
#   - label "major"  → v{M+1}.0.0
#   - label "minor"  → v{M}.{m+1}.0
#   - default        → v{M}.{m}.{p+1}
#
# Repository prerequisites:
#   - Settings → General → "Allow auto-merge" enabled.
#   - main has at least one required status check (so --auto has something
#     to wait on); the "style" check from tests.yml is a good minimal one.

on:
  pull_request:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Auto-merge & release
    if: >-
      github.event.label.name == 'deploy' &&
      github.event.pull_request.state == 'open' &&
      github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
      REPO: ${{ github.repository }}
      LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}

    steps:
      - name: Enable GitHub auto-merge
        run: gh pr merge "$PR_NUMBER" --repo "$REPO" --auto --squash

      - name: Wait for merge to complete
        id: wait
        run: |
          set -euo pipefail
          for attempt in $(seq 1 80); do
            state=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json state -q .state)
            sha=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json mergeCommit -q '.mergeCommit.oid // ""')
            head=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefName -q .headRefName)

            case "$state" in
              MERGED)
                echo "merge_sha=$sha" >>"$GITHUB_OUTPUT"
                echo "head_ref=$head" >>"$GITHUB_OUTPUT"
                echo "Merged (sha: $sha, ref: $head)"
                exit 0
                ;;
              CLOSED)
                echo "PR was closed without merging."
                exit 1
                ;;
            esac

            echo "Attempt $attempt: state=$state, waiting 20s…"
            sleep 20
          done
          echo "Timed out waiting for merge."
          exit 1

      - name: Delete merged branch
        continue-on-error: true
        run: |
          ref=${{ steps.wait.outputs.head_ref }}
          echo "Deleting branch: $ref"
          gh api -X DELETE "repos/$REPO/git/refs/heads/$ref" || echo "Branch already gone"

      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Compute next version
        id: version
        run: |
          set -euo pipefail
          last_tag=$(git tag --list 'v*' --sort=-v:refname | head -n 1 || true)

          if [ -z "$last_tag" ]; then
            next="v1.0.0"
          else
            IFS='.' read -r major minor patch <<<"${last_tag#v}"
            if printf '%s' "$LABELS" | grep -qi '"major"'; then
              next="v$((major + 1)).0.0"
            elif printf '%s' "$LABELS" | grep -qi '"minor"'; then
              next="v${major}.$((minor + 1)).0"
            else
              next="v${major}.${minor}.$((patch + 1))"
            fi
          fi

          echo "tag=$next" >>"$GITHUB_OUTPUT"
          echo "Previous: ${last_tag:-<none>}"
          echo "Next:     $next"

      - name: Create GitHub release
        env:
          TAG: ${{ steps.version.outputs.tag }}
          TARGET_SHA: ${{ steps.wait.outputs.merge_sha }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          gh release create "$TAG" \
            --repo "$REPO" \
            --target "$TARGET_SHA" \
            --title "$TAG — $PR_TITLE" \
            --generate-notes \
            --latest
